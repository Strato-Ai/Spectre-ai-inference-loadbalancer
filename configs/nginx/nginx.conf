# configs/nginx/nginx.conf
# Spectre AI Load Balancer — NGINX configuration

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # --- Rate limiting ---
    limit_conn_zone $binary_remote_addr zone=connlimit:10m;
    limit_req_zone  $binary_remote_addr zone=reqlimit:10m rate=10r/s;

    # --- Upstream groups (one per model) ---
    upstream backend_default {
        least_conn;
        server 10.0.2.10:1234 max_fails=3 fail_timeout=30s;  # qwen3-4b
        server 10.0.2.11:1234 max_fails=3 fail_timeout=30s;  # llama-3.1-8b
        server 10.0.2.12:1234 max_fails=3 fail_timeout=30s;  # deepseek-r1-7b
        keepalive 32;
    }

    upstream backend_qwen {
        least_conn;
        server 10.0.2.10:1234 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    upstream backend_llama {
        least_conn;
        server 10.0.2.11:1234 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    upstream backend_deepseek {
        least_conn;
        server 10.0.2.12:1234 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    # --- Model routing map ---
    map $uri $model_upstream {
        default                    backend_default;
        ~^/route/qwen/             backend_qwen;
        ~^/route/llama/            backend_llama;
        ~^/route/deepseek/         backend_deepseek;
    }

    # Strip /route/{model} prefix for backend
    map $uri $backend_uri {
        default                    $uri;
        ~^/route/[^/]+(/.*$)       $1;
    }

    # --- HTTP → HTTPS redirect ---
    server {
        listen 80 default_server;
        return 301 https://$host$request_uri;
    }

    # --- Main HTTPS server ---
    server {
        listen 443 ssl;
        server_name ai-lb.local;

        # SSL
        ssl_certificate     /etc/nginx/ssl/spectre.crt;
        ssl_certificate_key /etc/nginx/ssl/spectre.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Connection limits
        limit_conn connlimit 10;

        # --- Auth subrequest ---
        location = /_auth {
            internal;
            proxy_pass http://127.0.0.1:8081/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Api-Key $http_x_api_key;
        }

        # --- Health endpoint (no auth) ---
        location = /health {
            proxy_pass http://127.0.0.1:8080/health;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
        }

        # --- Model routing via URL path ---
        location ~ ^/route/([^/]+)/(.*) {
            auth_request /_auth;
            limit_req zone=reqlimit burst=5 nodelay;

            proxy_pass http://$model_upstream/$backend_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_set_header Accept-Encoding '';

            # Streaming / SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;
            chunked_transfer_encoding on;

            # Timeouts for long inference
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            send_timeout 300s;
        }

        # --- Default API proxy (no model routing) ---
        location /v1/ {
            auth_request /_auth;
            limit_req zone=reqlimit burst=5 nodelay;

            proxy_pass http://backend_default;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_set_header Accept-Encoding '';

            # Streaming / SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;
            chunked_transfer_encoding on;

            # Timeouts for long inference
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            send_timeout 300s;
        }

        # --- Sidecar API (internal, no auth) ---
        location /api/sidecar/ {
            proxy_pass http://127.0.0.1:8080/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
        }
    }
}
